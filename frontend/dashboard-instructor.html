<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instructor Dashboard — UMT LMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-10">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center">
        <span class="text-white font-bold">U</span>
      </div>
      <span class="font-bold text-slate-800">UMT LMS</span>
      <span class="text-xs bg-violet-100 text-violet-600 px-2 py-0.5 rounded-full font-semibold ml-2">Instructor</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="userName" class="text-sm text-slate-600 font-medium"></span>
      <button onclick="logout()" class="text-sm font-semibold text-red-500 hover:text-red-700">Logout</button>
    </div>
  </nav>

  <!-- Tab Nav -->
  <div class="bg-white border-b border-slate-100 px-8">
    <div class="flex gap-0 max-w-6xl mx-auto">
      <button onclick="showTab('courses')" id="tab-courses"
        class="tab-btn px-5 py-3 text-sm font-semibold border-b-2 border-violet-600 text-violet-600">
        My Courses
      </button>
      <button onclick="showTab('create')" id="tab-create"
        class="tab-btn px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700">
        Create Course
      </button>
      <button onclick="showTab('grading')" id="tab-grading"
        class="tab-btn px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700">
        Submissions & Grading
      </button>
    </div>
  </div>

  <main class="max-w-6xl mx-auto p-8">

    <!-- My Courses -->
    <div id="pane-courses">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-extrabold text-slate-800">My Courses</h2>
        <button onclick="loadMyCourses()" class="text-sm text-violet-600 font-semibold hover:underline">↻ Refresh</button>
      </div>
      <div id="my-courses-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <!-- Create Course -->
    <div id="pane-create" class="hidden max-w-2xl">
      <h2 class="text-2xl font-extrabold text-slate-800 mb-6">Create New Course</h2>
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
        <div>
          <label class="text-sm font-semibold text-slate-600 block mb-1">Course Title *</label>
          <input id="c-title" type="text" placeholder="e.g. Introduction to Python"
            class="w-full border border-slate-200 p-3 rounded-lg text-sm focus:ring-2 focus:ring-violet-400 outline-none">
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600 block mb-1">Description *</label>
          <textarea id="c-desc" placeholder="What will students learn?"
            class="w-full border border-slate-200 p-3 rounded-lg text-sm h-28 focus:ring-2 focus:ring-violet-400 outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-600 block mb-1">Category</label>
          <input id="c-cat" type="text" placeholder="e.g. Programming, Math, Science"
            class="w-full border border-slate-200 p-3 rounded-lg text-sm focus:ring-2 focus:ring-violet-400 outline-none">
        </div>

        <!-- Modules section -->
        <div>
          <div class="flex justify-between items-center mb-2">
            <label class="text-sm font-semibold text-slate-600">Learning Modules</label>
            <button onclick="addModuleField()" class="text-xs font-bold text-violet-600 hover:underline">+ Add Module</button>
          </div>
          <p class="text-xs text-slate-400 mb-2">You can also add/edit modules later from "My Courses → Manage Modules".</p>
          <div id="modules-container" class="space-y-2"></div>
        </div>

        <button onclick="createCourse()"
          class="w-full bg-violet-600 text-white py-3 rounded-lg font-bold hover:bg-violet-700 transition shadow-lg shadow-violet-100">
          Create Course
        </button>
        <p id="create-status" class="text-center text-sm font-semibold"></p>
      </div>
    </div>

    <!-- Grading -->
    <div id="pane-grading" class="hidden">
      <h2 class="text-2xl font-extrabold text-slate-800 mb-6">Submissions & Grading</h2>
      <div id="grading-list" class="space-y-6"></div>
    </div>

  </main>

  <!-- Edit Course Modal -->
  <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 flex">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl">
      <h3 class="text-lg font-bold text-slate-800 mb-4">Edit Course</h3>
      <label class="text-xs font-semibold text-slate-500 block mb-1">Title</label>
      <input id="edit-title" type="text" placeholder="Course Title"
        class="w-full border p-3 rounded-lg text-sm mb-3 focus:ring-2 focus:ring-violet-400 outline-none">
      <label class="text-xs font-semibold text-slate-500 block mb-1">Description</label>
      <textarea id="edit-desc" placeholder="Description"
        class="w-full border p-3 rounded-lg text-sm h-24 mb-3 focus:ring-2 focus:ring-violet-400 outline-none resize-none"></textarea>
      <label class="text-xs font-semibold text-slate-500 block mb-1">Category</label>
      <input id="edit-cat" type="text" placeholder="Category"
        class="w-full border p-3 rounded-lg text-sm mb-3 focus:ring-2 focus:ring-violet-400 outline-none">
      <input id="edit-id" type="hidden">
      <div class="flex gap-3">
        <button onclick="submitEdit()" class="flex-1 bg-violet-600 text-white py-2 rounded-lg font-bold hover:bg-violet-700">Save</button>
        <button onclick="closeEdit()" class="flex-1 border border-slate-200 text-slate-600 py-2 rounded-lg font-bold hover:bg-slate-50">Cancel</button>
      </div>
      <p id="edit-status" class="text-center text-sm font-semibold mt-3"></p>
    </div>
  </div>

  <!-- Manage Modules Modal -->
  <div id="modules-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 flex">
    <div class="bg-white rounded-2xl p-6 w-full max-w-2xl shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-slate-800">Manage Learning Modules</h3>
        <button onclick="closeModulesModal()" class="text-slate-400 hover:text-slate-700 text-2xl">×</button>
      </div>
      <p id="mm-course-title" class="text-sm text-slate-500 mb-4"></p>
      <input id="mm-course-id" type="hidden">

      <!-- Existing modules list -->
      <div id="mm-list" class="space-y-3 mb-6"></div>

      <!-- Add new module form -->
      <div class="border-t pt-4">
        <h4 class="text-sm font-bold text-slate-700 mb-3">+ Add New Module</h4>
        <input id="mm-new-title" type="text" placeholder="Module title"
          class="w-full border border-slate-200 p-2 rounded-lg text-sm mb-2 focus:ring-2 focus:ring-violet-400 outline-none">
        <textarea id="mm-new-content" placeholder="Module content / learning materials (optional)"
          class="w-full border border-slate-200 p-2 rounded-lg text-sm h-20 mb-2 focus:ring-2 focus:ring-violet-400 outline-none resize-none"></textarea>
        <button onclick="addModule()"
          class="w-full bg-violet-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-violet-700">
          Add Module to Course
        </button>
        <p id="mm-status" class="text-center text-sm font-semibold mt-2"></p>
      </div>
    </div>
  </div>

  <script>
    const API   = 'http://localhost:5000/api';
    const token = localStorage.getItem('lms_token');
    const user  = JSON.parse(localStorage.getItem('lms_user') || 'null');

    if (!user || user.role !== 'instructor') {
      localStorage.clear(); window.location.href = 'index.html';
    }
    document.getElementById('userName').innerText = user.name;

    // ── Tabs ────────────────────────────────────────────────────────────
    function showTab(tab) {
      ['courses','create','grading'].forEach(t => {
        document.getElementById('pane-' + t).classList.add('hidden');
        document.getElementById('tab-' + t).className =
          'tab-btn px-5 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700';
      });
      document.getElementById('pane-' + tab).classList.remove('hidden');
      document.getElementById('tab-' + tab).className =
        'tab-btn px-5 py-3 text-sm font-semibold border-b-2 border-violet-600 text-violet-600';
      if (tab === 'courses') loadMyCourses();
      if (tab === 'grading') loadGrading();
    }

    function escapeQ(s) {
      return (s || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
    }

    // ── My Courses ──────────────────────────────────────────────────────
    async function loadMyCourses() {
      const list = document.getElementById('my-courses-list');
      list.innerHTML = '<p class="col-span-2 text-slate-400 text-center py-10">Loading...</p>';
      try {
        const res     = await fetch(`${API}/courses/my`, { headers: { Authorization: `Bearer ${token}` } });
        const courses = await res.json();
        if (!courses.length) {
          list.innerHTML = `<div class="col-span-2 text-center py-16 bg-white rounded-2xl border-2 border-dashed border-slate-200">
            <p class="text-slate-400">No courses yet.</p>
            <button onclick="showTab('create')" class="mt-3 text-sm font-bold text-violet-600 hover:underline">Create your first course →</button>
          </div>`;
          return;
        }
        list.innerHTML = courses.map(c => `
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <div class="flex justify-between items-start mb-3">
              <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-full ${c.isArchived ? 'bg-red-50 text-red-600' : c.isPublished ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}">
                ${c.isArchived ? 'Archived' : c.isPublished ? 'Published' : 'Draft'}
              </span>
              <span class="text-xs text-slate-400">${c.enrolledStudents?.length || 0} students</span>
            </div>
            <h3 class="text-lg font-bold text-slate-800">${c.title}</h3>
            <p class="text-sm text-slate-500 mt-1 line-clamp-2">${c.description}</p>
            <p class="text-xs text-slate-400 mt-2">${c.modules?.length || 0} modules · ${c.assignments?.length || 0} assignments · ${c.quizzes?.length || 0} quizzes</p>
            ${c.isArchived ? `<p class="text-xs text-red-500 mt-2">⚠ Archived by admin: ${c.archiveReason || 'Policy violation'}</p>` : ''}
            <div class="mt-4 pt-4 border-t border-slate-50 flex gap-2 flex-wrap">
              <button onclick="openEdit('${c._id}','${escapeQ(c.title)}','${escapeQ(c.description)}','${escapeQ(c.category||'')}')"
                class="text-xs font-bold px-3 py-1.5 rounded-lg bg-slate-100 text-slate-700 hover:bg-slate-200">Edit</button>
              <button onclick="openModulesModal('${c._id}','${escapeQ(c.title)}')"
                class="text-xs font-bold px-3 py-1.5 rounded-lg bg-violet-50 text-violet-600 hover:bg-violet-100">Manage Modules</button>
              <button onclick="togglePublish('${c._id}')" ${c.isArchived ? 'disabled' : ''}
                class="text-xs font-bold px-3 py-1.5 rounded-lg ${c.isArchived ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : c.isPublished ? 'bg-amber-50 text-amber-600 hover:bg-amber-100' : 'bg-emerald-50 text-emerald-600 hover:bg-emerald-100'}">
                ${c.isPublished ? 'Unpublish' : 'Publish'}
              </button>
              <button onclick="deleteCourse('${c._id}')"
                class="text-xs font-bold px-3 py-1.5 rounded-lg bg-red-50 text-red-500 hover:bg-red-100">Delete</button>
            </div>
          </div>
        `).join('');
      } catch {
        list.innerHTML = '<p class="col-span-2 text-center text-red-500">Failed to load courses.</p>';
      }
    }

    // ── Create Course ───────────────────────────────────────────────────
    let moduleCount = 0;
    function addModuleField() {
      moduleCount++;
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-start';
      div.innerHTML = `
        <div class="flex-1 space-y-1">
          <input type="text" placeholder="Module ${moduleCount} Title" class="w-full border border-slate-200 p-2 rounded text-sm module-title">
          <textarea placeholder="Module content (optional)" class="w-full border border-slate-200 p-2 rounded text-sm h-16 resize-none module-content"></textarea>
        </div>
        <button onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-600 mt-2 text-lg font-bold">×</button>`;
      document.getElementById('modules-container').appendChild(div);
    }

    async function createCourse() {
      const st = document.getElementById('create-status');
      const title = document.getElementById('c-title').value.trim();
      const desc  = document.getElementById('c-desc').value.trim();
      const cat   = document.getElementById('c-cat').value.trim();

      if (!title || !desc) {
        st.className = 'text-center text-sm font-semibold text-red-500';
        st.innerText = 'Title and description are required.'; return;
      }

      const moduleTitles   = [...document.querySelectorAll('.module-title')].map(el => el.value.trim());
      const moduleContents = [...document.querySelectorAll('.module-content')].map(el => el.value.trim());
      const modules = moduleTitles.filter(t => t).map((t, i) => ({ title: t, content: moduleContents[i] || '', order: i }));

      try {
        const res  = await fetch(`${API}/courses/add`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ title, description: desc, category: cat, modules })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        st.className = 'text-center text-sm font-semibold text-emerald-600';
        st.innerText = 'Course created successfully!';
        // Clear form
        ['c-title','c-desc','c-cat'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modules-container').innerHTML = '';
        moduleCount = 0;
      } catch (err) {
        st.className = 'text-center text-sm font-semibold text-red-500';
        st.innerText = err.message;
      }
    }

    // ── Edit Course ─────────────────────────────────────────────────────
    function openEdit(id, title, desc, cat) {
      document.getElementById('edit-id').value    = id;
      document.getElementById('edit-title').value = title;
      document.getElementById('edit-desc').value  = desc;
      document.getElementById('edit-cat').value   = cat || '';
      document.getElementById('edit-status').innerText = '';
      document.getElementById('edit-modal').classList.remove('hidden');
    }
    function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

    async function submitEdit() {
      const id    = document.getElementById('edit-id').value;
      const title = document.getElementById('edit-title').value;
      const desc  = document.getElementById('edit-desc').value;
      const cat   = document.getElementById('edit-cat').value;
      const st    = document.getElementById('edit-status');
      try {
        const res  = await fetch(`${API}/courses/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ title, description: desc, category: cat })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        st.className = 'text-center text-sm font-semibold text-emerald-600';
        st.innerText = 'Course updated!';
        setTimeout(() => { closeEdit(); loadMyCourses(); }, 800);
      } catch (err) {
        st.className = 'text-center text-sm font-semibold text-red-500';
        st.innerText = err.message;
      }
    }

    // ── Manage Modules Modal (FR-CM-01) ─────────────────────────────────
    async function openModulesModal(courseId, title) {
      document.getElementById('mm-course-id').value = courseId;
      document.getElementById('mm-course-title').innerText = `Course: ${title}`;
      document.getElementById('mm-new-title').value = '';
      document.getElementById('mm-new-content').value = '';
      document.getElementById('mm-status').innerText = '';
      document.getElementById('modules-modal').classList.remove('hidden');
      await refreshModulesList(courseId);
    }

    function closeModulesModal() {
      document.getElementById('modules-modal').classList.add('hidden');
      loadMyCourses(); // refresh card counts
    }

    async function refreshModulesList(courseId) {
      const list = document.getElementById('mm-list');
      list.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">Loading modules...</p>';
      try {
        const res    = await fetch(`${API}/courses/${courseId}`, { headers: { Authorization: `Bearer ${token}` } });
        const course = await res.json();
        const mods   = course.modules || [];
        if (!mods.length) {
          list.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">No modules yet. Add your first one below.</p>';
          return;
        }
        list.innerHTML = mods.map((m, i) => `
          <div class="border border-slate-200 rounded-lg p-3 bg-slate-50/50">
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-bold text-violet-600">MODULE ${i+1}</span>
              <button onclick="deleteModule('${courseId}','${m._id}')"
                class="text-xs font-bold text-red-500 hover:text-red-700">Delete</button>
            </div>
            <input type="text" value="${escapeQ(m.title)}"
              id="mod-title-${m._id}"
              class="w-full border border-slate-200 p-2 rounded text-sm mb-2 bg-white">
            <textarea
              id="mod-content-${m._id}"
              class="w-full border border-slate-200 p-2 rounded text-sm h-16 resize-none bg-white">${m.content || ''}</textarea>
            <button onclick="saveModule('${courseId}','${m._id}')"
              class="mt-2 text-xs font-bold bg-violet-600 text-white px-3 py-1.5 rounded hover:bg-violet-700">
              Save Changes
            </button>
          </div>
        `).join('');
      } catch {
        list.innerHTML = '<p class="text-red-500 text-sm text-center py-4">Failed to load modules.</p>';
      }
    }

    async function addModule() {
      const courseId = document.getElementById('mm-course-id').value;
      const title    = document.getElementById('mm-new-title').value.trim();
      const content  = document.getElementById('mm-new-content').value.trim();
      const st       = document.getElementById('mm-status');

      if (!title) {
        st.className = 'text-center text-sm font-semibold text-red-500 mt-2';
        st.innerText = 'Module title is required.'; return;
      }

      try {
        const res  = await fetch(`${API}/courses/${courseId}/modules`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ title, content })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        st.className = 'text-center text-sm font-semibold text-emerald-600 mt-2';
        st.innerText = 'Module added!';
        document.getElementById('mm-new-title').value = '';
        document.getElementById('mm-new-content').value = '';
        await refreshModulesList(courseId);
      } catch (err) {
        st.className = 'text-center text-sm font-semibold text-red-500 mt-2';
        st.innerText = err.message;
      }
    }

    async function saveModule(courseId, moduleId) {
      const title   = document.getElementById(`mod-title-${moduleId}`).value;
      const content = document.getElementById(`mod-content-${moduleId}`).value;
      const st      = document.getElementById('mm-status');
      try {
        const res = await fetch(`${API}/courses/${courseId}/modules/${moduleId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ title, content })
        });
        if (!res.ok) throw new Error('Save failed.');
        st.className = 'text-center text-sm font-semibold text-emerald-600 mt-2';
        st.innerText = 'Module saved.';
      } catch (err) {
        st.className = 'text-center text-sm font-semibold text-red-500 mt-2';
        st.innerText = err.message;
      }
    }

    async function deleteModule(courseId, moduleId) {
      if (!confirm('Delete this module? This cannot be undone.')) return;
      try {
        await fetch(`${API}/courses/${courseId}/modules/${moduleId}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` }
        });
        await refreshModulesList(courseId);
      } catch {
        alert('Failed to delete module.');
      }
    }

    async function togglePublish(id) {
      await fetch(`${API}/courses/${id}/publish`, {
        method: 'PATCH', headers: { Authorization: `Bearer ${token}` }
      });
      loadMyCourses();
    }

    async function deleteCourse(id) {
      if (!confirm('Delete this course? This cannot be undone.')) return;
      await fetch(`${API}/courses/${id}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${token}` }
      });
      loadMyCourses();
    }

    // ── Grading ─────────────────────────────────────────────────────────
    async function loadGrading() {
      const el = document.getElementById('grading-list');
      el.innerHTML = '<p class="text-slate-400 text-center py-10">Loading...</p>';
      try {
        const res     = await fetch(`${API}/courses/my`, { headers: { Authorization: `Bearer ${token}` } });
        const courses = await res.json();

        const withAssignments = courses.filter(c => c.assignments?.length);
        if (!withAssignments.length) {
          el.innerHTML = '<p class="text-center text-slate-400 py-10">No assignments created yet.</p>'; return;
        }

        el.innerHTML = withAssignments.map(c => `
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <h3 class="font-bold text-slate-800 text-lg mb-4">${c.title}</h3>
            ${c.assignments.map(a => `
              <div class="border border-slate-100 rounded-xl p-4 mb-4">
                <div class="flex justify-between items-center mb-3">
                  <h4 class="font-semibold text-slate-700">${a.title}</h4>
                  <span class="text-xs text-slate-400">${a.submissions?.length || 0} submission(s)</span>
                </div>
                ${!a.submissions?.length
                  ? '<p class="text-sm text-slate-400">No submissions yet.</p>'
                  : a.submissions.map(s => `
                    <div class="flex items-center gap-3 py-2 border-b border-slate-50 last:border-0">
                      <div class="flex-1">
                        <p class="text-sm font-medium text-slate-700">Student ID: ${s.student}</p>
                        ${s.fileUrl ? `<a href="${s.fileUrl}" target="_blank" class="text-xs text-indigo-500 hover:underline">View Submission</a>` : '<span class="text-xs text-slate-400">No file</span>'}
                      </div>
                      <input type="number" min="0" max="100" placeholder="Grade"
                        id="grade-${c._id}-${a._id}-${s.student}"
                        value="${s.grade !== null ? s.grade : ''}"
                        class="w-20 border border-slate-200 rounded-lg p-1 text-sm text-center">
                      <input type="text" placeholder="Feedback"
                        id="feedback-${c._id}-${a._id}-${s.student}"
                        value="${s.feedback || ''}"
                        class="flex-1 border border-slate-200 rounded-lg p-1 text-sm">
                      <button onclick="submitGrade('${c._id}','${a._id}','${s.student}')"
                        class="text-xs font-bold bg-violet-600 text-white px-3 py-1.5 rounded-lg hover:bg-violet-700">
                        Save
                      </button>
                    </div>`).join('')}
              </div>`).join('')}
          </div>`).join('');
      } catch {
        el.innerHTML = '<p class="text-center text-red-500">Failed to load grading data.</p>';
      }
    }

    async function submitGrade(courseId, assignmentId, studentId) {
      const grade    = document.getElementById(`grade-${courseId}-${assignmentId}-${studentId}`).value;
      const feedback = document.getElementById(`feedback-${courseId}-${assignmentId}-${studentId}`).value;
      try {
        const res = await fetch(`${API}/courses/${courseId}/assignments/${assignmentId}/grade/${studentId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
          body: JSON.stringify({ grade: Number(grade), feedback })
        });
        if (res.ok) alert('Grade saved!');
      } catch { alert('Failed to save grade.'); }
    }

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    loadMyCourses();
  </script>
</body>
</html>
